name: Build FlexBoard Pro APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: flexboard-pro
        run: chmod +x gradlew || true

      - name: Generate Gradle wrapper if missing
        working-directory: flexboard-pro
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: flexboard-pro
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FlexBoardPro-debug-apk
          path: flexboard-pro/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build Release APK (unsigned)
        working-directory: flexboard-pro
        run: ./gradlew assembleRelease --stacktrace || true

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FlexBoardPro-release-apk
          path: flexboard-pro/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          
